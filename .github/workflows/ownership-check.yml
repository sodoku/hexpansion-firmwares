name: Ownership Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-ownership:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check each modified file against CODEOWNERS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          failed=0
          while IFS= read -r file; do
            if ! python3 find_owner.py "$file" "$PR_AUTHOR"; then
              echo "FAIL: $PR_AUTHOR is not an owner of $file"
              failed=1
            fi
          done < <(gh api "repos/matthewwilkes/hexpansion-firmwares/pulls/3/files" --paginate --jq '.[].filename')
          exit $failed
