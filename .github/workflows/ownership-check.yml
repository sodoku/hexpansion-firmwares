name: Ownership Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, edited]


permissions:
  pull-requests: write

jobs:
  check-ownership:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check each modified file against CODEOWNERS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          approvers=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" --paginate \
            --jq '[.[] | select(.state == "APPROVED") | .user.login] | unique | .[]')
          users=($PR_AUTHOR $approvers)

          failed=0
          while IFS= read -r file; do
            if ! python3 find_owner.py "$file" "${users[@]}"; then
              echo "FAIL: none of [${users[*]}] is an owner of $file"
              failed=1
            fi
          done < <(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename')
          exit $failed

      - name: Auto Merge
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
